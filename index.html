<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Orders Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 40px;
      color: #222;
    }
    .card {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
    }
    .box {
      background: #f2f4f8;
      padding: 16px;
      border-radius: 12px;
      margin-top: 20px;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Telegram Orders Dashboard</h1>
    <p>Проект отправляет последние заказы из Supabase в Telegram.</p>

    <div class="box">
📦 Последние заказы:

Айгуль — 15000 — ID 41
Дина — 40000 — ID 42
Нургуль — 58000 — ID 43
Малика — 45000 — ID 44
Зарина — 56000 — ID 45
    </div>

    <p>Смотри GitHub для кода и деталей.</p>
  </div>
</body>
</html>
